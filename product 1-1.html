<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Produit</title>
<link rel="stylesheet" href="../product/main.css">
</head>

<body>

<div class="product-container">

    <!-- IMAGE -->
    <div class="product-image">
        <img id="product-img">
    </div>

    <!-- DETAILS -->
    <div class="product-details">

        <div class="top">
            <h2 id="title"></h2>
            <span class="price" id="price"></span>
        </div>

        <!-- COLORS -->
        <p class="label">COLOR</p>
        <div class="colors">
            <div class="color-box"></div>
            <div class="color-box active"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
            <div class="color-box"></div>
        </div>

        <!-- SIZES -->
        <div class="sizes">
            <span>XXS</span>
            <span>XS</span>
            <span>S</span>
            <span>M</span>
            <span>L</span>
            <span>XL</span>
            <span>XXL</span>
            <span>XXXL</span>
        </div>

        <p class="size-guide">SIZE GUIDE</p>

        <!-- BUTTON -->
        <button class="add-btn">ADD TO BAG</button>

        <!-- DETAILS -->
        <div class="info">
            <h4>DETAILS</h4>
            <p>
                Standard Fit<br>
                415 GSM 100% Cotton<br>
                Diagonal Loopback Knit French Terry<br>
                Embroidered Patch / Left Chest
            </p>
        </div>

    </div>

</div>

<!-- JS -->

</body>
</html>
